<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Cancelado - Marcus Consultoria</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .cancelado-container {
            max-width: 600px;
            margin: 4rem auto;
            padding: 2rem;
            text-align: center;
        }

        .cancelado-box {
            background: white;
            padding: 3rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 51, 102, 0.1);
        }

        .cancelado-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .cancelado-box h1 {
            color: #FF6B6B;
            margin-bottom: 1rem;
        }

        .cancelado-box p {
            color: #666;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .btn-tentar {
            background: #003366;
            color: white;
            padding: 0.75rem 2rem;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin: 0.5rem;
        }

        .btn-tentar:hover {
            background: #002244;
        }

        .btn-home {
            background: #999;
            color: white;
            padding: 0.75rem 2rem;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin: 0.5rem;
        }

        .btn-home:hover {
            background: #777;
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">Marcus Consultoria</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#servicos">Serviços</a></li>
                <li><a href="index.html#contato">Contato</a></li>
            </ul>
        </nav>
    </header>

    <section class="cancelado-container">
        <div class="cancelado-box">
            <div class="cancelado-icon">❌</div>
            <h1>Pagamento Cancelado</h1>
            <p>Seu pagamento foi cancelado. Nenhum valor foi cobrado.</p>
            <p>Se tiver dúvidas ou dificuldades, entre em contato conosco!</p>

            <div>
                <a href="index.html#servicos" class="btn-tentar">🔄 Tentar Novamente</a>
                <a href="index.html" class="btn-home">🏠 Voltar ao Home</a>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Marcus Consultoria. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
